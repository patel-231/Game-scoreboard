<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cricket Scorer (Permanent Save)</title>
    <style>
        :root { --primary: #0f172a; --accent: #fbbf24; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .team-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .team-row input { width: 35%; padding: 10px; border-radius: 8px; border: none; font-weight: bold; text-align: center; font-size: 0.9rem; }
        .swap-btn { background: var(--accent); color: var(--primary); border: none; padding: 5px 12px; border-radius: 20px; font-weight: 800; cursor: pointer; }

        .score-display { padding: 30px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .score-display h1 { font-size: 4.5rem; margin: 0; color: var(--primary); letter-spacing: -2px; }
        .sub-stats { display: flex; justify-content: center; gap: 30px; margin-top: 10px; font-weight: 600; color: #64748b; }

        .batsmen-box { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; background: #f8fafc; }
        .field-group input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-weight: 600; }

        .current-over { padding: 15px; text-align: center; min-height: 45px; }
        .ball-icon { display: inline-block; width: 32px; height: 32px; line-height: 32px; border-radius: 50%; margin: 3px; font-weight: bold; color: white; font-size: 0.8rem; }

        .grid-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        button.btn { padding: 15px 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; }
        .btn-run { background: #3b82f6; }
        .btn-extra { background: #f59e0b; }
        .btn-out { background: var(--error); grid-column: span 2; }
        .btn-save { background: var(--success); grid-column: span 4; padding: 18px; margin-top: 5px; }

        .history-pane { padding: 15px; background: #0f172a; color: white; max-height: 300px; overflow-y: auto; }
        .log-entry { background: #1e293b; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); position: relative; }
        .log-entry .top { display: flex; justify-content: space-between; font-size: 0.75rem; color: #94a3b8; }
        .clear-btn { background: #ef4444; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body onload="loadSavedData()">

<div class="container">
    <div class="header">
        <div class="team-row">
            <input type="text" id="t1" value="TEAM 1" onchange="saveToStorage()">
            <button class="swap-btn" onclick="swapTeams()">VS</button>
            <input type="text" id="t2" value="TEAM 2" onchange="saveToStorage()">
        </div>
        <div id="match-date" style="font-size: 0.7rem; opacity: 0.8;"></div>
    </div>

    <div class="score-display">
        <h1 id="live-score">0 - 0</h1>
        <div class="sub-stats">
            <div>OVERS: <span id="live-overs">0.0</span></div>
            <div>CRR: <span id="live-crr">0.00</span></div>
        </div>
    </div>

    <div class="batsmen-box">
        <div class="field-group"><input type="text" id="p1" placeholder="Striker" onchange="saveToStorage()"></div>
        <div class="field-group"><input type="text" id="p2" placeholder="Non-Striker" onchange="saveToStorage()"></div>
    </div>

    <div class="current-over" id="over-dots"></div>

    <div class="grid-controls">
        <button class="btn btn-run" onclick="record(0)">0</button>
        <button class="btn btn-run" onclick="record(1)">1</button>
        <button class="btn btn-run" onclick="record(2)">2</button>
        <button class="btn btn-run" onclick="record(3)">3</button>
        <button class="btn btn-run" onclick="record(4)">4</button>
        <button class="btn btn-run" onclick="record(6)">6</button>
        <button class="btn btn-extra" onclick="extra('WD')">WD</button>
        <button class="btn btn-extra" onclick="extra('NB')">NB</button>
        <button class="btn btn-out" onclick="record('W')">WICKET</button>
        <button class="btn btn-save" onclick="saveOver()">SAVE OVER DATA</button>
        <button class="clear-btn" onclick="clearData()">CLEAR ALL DATA</button>
    </div>

    <div class="history-pane">
        <div id="logs"></div>
    </div>
</div>

<script>
    let matchData = {
        score: 0, outs: 0, balls: 0,
        currentOver: [],
        history: []
    };

    function saveToStorage() {
        matchData.t1 = document.getElementById('t1').value;
        matchData.t2 = document.getElementById('t2').value;
        matchData.p1 = document.getElementById('p1').value;
        matchData.p2 = document.getElementById('p2').value;
        localStorage.setItem('cricketData', JSON.stringify(matchData));
    }

    function loadSavedData() {
        const saved = localStorage.getItem('cricketData');
        if (saved) {
            matchData = JSON.parse(saved);
            document.getElementById('t1').value = matchData.t1 || "TEAM 1";
            document.getElementById('t2').value = matchData.t2 || "TEAM 2";
            document.getElementById('p1').value = matchData.p1 || "";
            document.getElementById('p2').value = matchData.p2 || "";
            document.getElementById('match-date').innerText = new Date().toDateString();
            
            // Restore visual dots for current over
            matchData.currentOver.forEach(b => addDotVisual(b, b === 'W' ? '#ef4444' : (typeof b === 'string' ? '#f59e0b' : '#3b82f6')));
            // Restore history list
            matchData.history.forEach(h => renderHistoryUI(h));
            updateUI();
        }
    }

    function record(val) {
        if(val === 'W') matchData.outs++; else matchData.score += val;
        matchData.balls++;
        matchData.currentOver.push(val);
        addDotVisual(val, val === 'W' ? '#ef4444' : '#3b82f6');
        saveToStorage();
        updateUI();
    }

    function extra(type) {
        matchData.score += 1;
        matchData.currentOver.push(type);
        addDotVisual(type, '#f59e0b');
        saveToStorage();
        updateUI();
    }

    function addDotVisual(txt, col) {
        const d = document.createElement('span');
        d.className = 'ball-icon';
        d.style.background = col;
        d.innerText = txt;
        document.getElementById('over-dots').appendChild(d);
    }

    function updateUI() {
        document.getElementById('live-score').innerText = `${matchData.score} - ${matchData.outs}`;
        document.getElementById('live-overs').innerText = Math.floor(matchData.balls / 6) + "." + (matchData.balls % 6);
        const decOvers = (Math.floor(matchData.balls / 6)) + (matchData.balls % 6 / 6);
        document.getElementById('live-crr').innerText = decOvers > 0 ? (matchData.score / decOvers).toFixed(2) : "0.00";
    }

    function saveOver() {
        if(matchData.currentOver.length === 0) return;
        const entry = {
            over: Math.ceil(matchData.balls / 6),
            teams: `${matchData.t1} vs ${matchData.t2}`,
            players: `${matchData.p1} & ${matchData.p2}`,
            balls: [...matchData.currentOver]
        };
        matchData.history.push(entry);
        renderHistoryUI(entry);
        matchData.currentOver = [];
        document.getElementById('over-dots').innerHTML = '';
        saveToStorage();
    }

    function renderHistoryUI(h) {
        const log = document.createElement('div');
        log.className = 'log-entry';
        log.innerHTML = `<div class="top"><span>OVER ${h.over}</span><span>${h.teams}</span></div>
                         <div style="font-size:0.8rem; margin:5px 0;">🏏 ${h.players}</div>
                         <div style="color:var(--accent); font-weight:bold;">${h.balls.join(' • ')}</div>`;
        document.getElementById('logs').prepend(log);
    }

    function swapTeams() {
        let t1 = document.getElementById('t1');
        let t2 = document.getElementById('t2');
        [t1.value, t2.value] = [t2.value, t1.value];
        saveToStorage();
    }

    function clearData() {
        if(confirm("Erase all match data forever?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
